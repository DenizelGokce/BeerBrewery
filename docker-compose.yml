version: '3.8'

services:
  beerbrewery:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - beerbrewery-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/beerbrewery.db

volumes:
  beerbrewery-data: